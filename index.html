  <!-- ── AGREGADO: Script del toggle día/noche ──────────────────────────────
       Restaura el tema guardado al cargar. Ambos botones (desktop y mobile)
       llaman a la misma función. El tema se guarda en localStorage para que
       se recuerde al navegar entre todas las páginas del sitio.
  ─────────────────────────────────────────────────────────────────────────── -->
  <script>
    (function () {
      const html = document.documentElement;

      // Restaurar tema al cargar la página
      const saved = localStorage.getItem('gym-theme') || 'dark';
      html.setAttribute('data-theme', saved);

      function toggleTheme() {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('gym-theme', next);
      }

      document.getElementById('themeToggleDesktop').addEventListener('click', toggleTheme);
      document.getElementById('themeToggleMobile').addEventListener('click', toggleTheme);
    })();
  </script>
  <!-- ── FIN AGREGADO ─────────────────────────────────────────────────────── -->

  <script src="common.js"></script>
