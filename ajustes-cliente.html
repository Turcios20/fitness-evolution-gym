<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajustes - FITNESS EVOLUTIONS GYM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="cliente-page">
  <div class="gym-bg"></div>
  <div class="page">
    <nav class="topnav cliente-topnav">
      <div class="logo">FITNESS<span>EVOLUTIONS GYM</span></div>
      <div class="user-avatar-wrap" id="avatarWrap">
        <div class="user-avatar" id="userAvatar">--</div>
        <div class="avatar-dropdown" id="avatarDropdown">
          <div class="dropdown-name" id="dropdownName">-</div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-logout" id="btnLogout">Cerrar sesion</button>
        </div>
      </div>
    </nav>

    <main class="content cliente-content">
      <div class="fadein">
        <a href="cliente.html" class="btn-back">← Volver</a>
        <p class="welcome-sub">Panel de usuario</p>
        <h1 class="welcome-title">Ajustes</h1>
      </div>

      <div class="fadein-2 coming-soon-card">
        <img src="assets/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Ajustes" class="coming-icon">
        <p class="coming-title">Preferencias de tu cuenta</p>
        <p class="coming-sub">Guarda el tema visual para que se mantenga en tus proximos ingresos.</p>

        <div class="toggle-row" style="max-width:420px;margin:24px auto 0;text-align:left;">
          <div class="toggle-info">
            <div class="toggle-name">Modo oscuro</div>
            <div class="toggle-desc">Si lo desactivas, tu cuenta usara el modo claro en todo el sistema.</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="clientThemeToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div style="margin-top:20px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
          <button class="btn-orange" id="btnSaveClientTheme" style="margin-top:0;display:inline-block;width:auto;padding:10px 28px;" type="button">
            Guardar preferencia
          </button>
          <a href="cliente.html" class="btn-cancel" style="width:auto;padding:10px 22px;">
            Volver al inicio
          </a>
        </div>
      </div>
    </main>

    <nav class="bottomnav">
      <a href="cliente.html" class="bot-link">
        <img src="assets/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Inicio"> Inicio
      </a>
      <a href="calendario-cliente.html" class="bot-link">
        <img src="assets/calendar_month_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Calendario"> Calendario
      </a>
      <a href="ajustes-cliente.html" class="bot-link active">
        <img src="assets/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Ajustes"> Ajustes
      </a>
    </nav>
  </div>

  <script src="common.js"></script>
  <script src="ajustes-cliente.js"></script>
</body>
</html>
