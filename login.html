<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesion - FITNESS EVOLUTIONS GYM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="gym-bg"></div>

  <div class="login-wrapper">
    <div class="login-box fadein">
      <div class="login-logo">
        FITNESS
        <span>EVOLUTIONS GYM</span>
      </div>

      <input
        class="input-field"
        type="text"
        id="loginUsername"
        placeholder="Correo electronico"
        autocomplete="username"
      >

      <div class="password-field">
        <input
          class="input-field"
          type="password"
          id="loginPassword"
          placeholder="Contrasena"
          autocomplete="current-password"
        >
        <button type="button" data-password-toggle="loginPassword"></button>
      </div>

      <div class="login-feedback" id="loginFeedback"></div>

      <button type="button" class="btn-orange" id="btnLogin">Iniciar sesion</button>

    </div>

    <footer class="login-footer" id="loginFooter" hidden>
      <p class="login-footer-slogan" id="footerEslogan"></p>
      <div class="login-footer-info">
        <span id="footerTelefono"></span>
        <span id="footerCorreo"></span>
        <span id="footerDireccion"></span>
      </div>
    </footer>
  </div>

  <script src="common.js"></script>
  <script src="login.js"></script>
</body>
</html>
