<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Cliente — FITNESS EVOLUTIONS GYM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="gym-bg"></div>

  <div class="page">

    <!-- ===== NAV SUPERIOR ===== -->
    <nav class="topnav">
      <div class="logo">
        FITNESS
        <span>EVOLUTIONS GYM</span>
      </div>
      <a href="admin.html" class="nav-link">
        <img src="assets/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Inicio">
        Inicio
      </a>
      <a href="miembros.html" class="nav-link">
        <img src="assets/group_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Miembros">
        Miembros
      </a>
      <a href="finanzas.html" class="nav-link">
        <img src="assets/attach_money_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Finanzas">
        Finanzas
      </a>
      <a href="ajustes.html" class="nav-link">
        <img src="assets/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Ajustes">
        Ajustes
      </a>
    </nav>

    <!-- ===== FORMULARIO ===== -->
    <main class="content">

      <div class="fadein">
        <!-- Botón volver -->
        <a href="admin.html" class="btn-back">← Volver</a>
        <p class="welcome-sub">Gestión de miembros</p>
        <h1 class="welcome-title">Agregar nuevo cliente</h1>
      </div>

      <!-- Tarjeta del formulario -->
      <div class="form-card fadein-2">

        <!-- Mensaje de error / éxito — oculto por defecto -->
        <div id="form-msg" class="form-msg" style="display:none;"></div>

        <!-- Nombre completo -->
        <div class="form-group">
          <label class="form-label" for="nombre">Nombre completo</label>
          <input
            class="input-field"
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ej: Jhoscar Manuel"
            autocomplete="off"
            required
          />
          <span class="form-error" id="err-nombre"></span>
        </div>

        <!-- Correo electrónico -->
        <div class="form-group">
          <label class="form-label" for="correo">Correo electrónico</label>
          <input
            class="input-field"
            type="email"
            id="correo"
            name="correo"
            placeholder="correo@ejemplo.com"
            autocomplete="off"
            required
          />
          <span class="form-error" id="err-correo"></span>
        </div>

        <!-- Contraseña -->
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            class="input-field"
            type="password"
            id="password"
            name="password"
            placeholder="Mínimo 6 caracteres"
            required
          />
          <span class="form-error" id="err-password"></span>
        </div>

        <!-- Plan de membresía -->
        <div class="form-group">
          <label class="form-label" for="plan">Plan de membresía</label>
          <select class="input-field input-select" id="plan" name="plan" required>
            <option value="">Seleccionar plan...</option>
            <option value="Mensual">Mensual</option>
            <option value="Trimestral">Trimestral</option>
            <option value="Semestral">Semestral</option>
            <option value="Anual">Anual</option>
          </select>
          <span class="form-error" id="err-plan"></span>
        </div>

        <!-- Precio -->
        <div class="form-group">
          <label class="form-label" for="precio">Precio ($)</label>
          <input
            class="input-field"
            type="number"
            id="precio"
            name="precio"
            placeholder="20"
            min="1"
            required
          />
          <span class="form-error" id="err-precio"></span>
        </div>

        <!-- Botones -->
        <div class="form-actions">
          <a href="admin.html" class="btn-cancel">Cancelar</a>
          <button type="button" id="btn-guardar" class="btn-orange form-submit">
            Agregar cliente
          </button>
        </div>

      </div>

    </main>
  </div>

  <script src="common.js"></script>
  <script src="form.js"></script>
</body>
</html>
