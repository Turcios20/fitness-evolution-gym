<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cliente — FITNESS EVOLUTIONS GYM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="cliente-page">

  <div class="gym-bg"></div>

  <div class="page">

    <!-- ===== TOPBAR ===== -->
    <nav class="topnav cliente-topnav">
      <div class="logo">
        FITNESS
        <span>EVOLUTIONS GYM</span>
      </div>

      <!-- Avatar con iniciales + dropdown de sesión -->
      <div class="user-avatar-wrap" id="avatarWrap">
        <!-- Las iniciales las genera cliente.js con los datos de sesión -->
        <div class="user-avatar" id="userAvatar">--</div>

        <!-- Dropdown que aparece al hacer clic -->
        <div class="avatar-dropdown" id="avatarDropdown">
          <div class="dropdown-name" id="dropdownName">—</div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-logout" id="btnLogout">
            Cerrar sesión
          </button>
        </div>
      </div>
    </nav>

    <!-- ===== CONTENIDO ===== -->
    <!-- max-width centrado para que no se estire en pantallas grandes -->
    <main class="content cliente-content">

      <div class="fadein">
        <p class="welcome-sub">Panel de usuario</p>
        <h1 class="welcome-title" id="welcomeTitle">¡Bienvenido!</h1>
      </div>

      <!-- Gestión de suscripción -->
      <div class="fadein-3">
        <div class="section-header">
          <span class="section-title">Gestión de Suscripción</span>
        </div>
        <div class="subs-card">
          <div class="subs-row">
            <span class="subs-key">Tipo de suscripción</span>
            <span class="subs-val orange" id="planType">Mensual</span>
          </div>
          <div class="subs-row">
            <span class="subs-key">Tiempo restante</span>
            <span class="subs-val" id="daysLeft">14 días</span>
          </div>
        </div>
      </div>

      <!-- Mi entrenamiento -->
      <div class="fadein-4">
        <div class="section-header">
          <span class="section-title">Mis rutinas</span>
        </div>
        <div id="rutinasContainer">
          <p style="text-align:center;color:var(--text-dim);padding:14px;">
            Cargando rutinas...
          </p>
        </div>
      </div>

      <!-- Catálogo de planes -->
      <div class="fadein-4">
        <div class="section-header">
          <span class="section-title">Catálogo de planes</span>
        </div>
        <div class="catalog-grid" id="catalogGrid">
          <div class="plan-card"><p class="plan-note">Cargando planes...</p></div>
        </div>
      </div>

    </main>

    <!-- ===== NAV INFERIOR ===== -->
    <nav class="bottomnav">
      <a href="cliente.html" class="bot-link active">
        <img src="assets/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Inicio">
        Inicio
      </a>
      <a href="calendario-cliente.html" class="bot-link">
        <img src="assets/calendar_month_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Calendario">
        Calendario
      </a>
      <a href="progreso-cliente.html" class="bot-link">
        <img src="assets/exercise_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Progreso">
        Progreso
      </a>
      <a href="evolucion-cliente.html" class="bot-link">
        <img src="assets/evolution.svg" alt="Evolucion">
        Evolucion
      </a>
      <a href="ajustes-cliente.html" class="bot-link">
        <img src="assets/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Ajustes">
        Ajustes
      </a>
    </nav>

  </div>

  <script src="common.js"></script>
  <script src="cliente.js"></script>
</body>
</html>
