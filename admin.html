<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — FITNESS EVOLUTIONS GYM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Fondo foto del gym -->
  <div class="gym-bg"></div>

  <div class="page">

    <!-- ===== NAV SUPERIOR ===== -->
    <nav class="topnav">
      <div class="logo">
        FITNESS
        <span>EVOLUTIONS GYM</span>
      </div>

      <a href="admin.html" class="nav-link active">
        <img src="assets/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Inicio">
        Inicio
      </a>

      <a href="#" class="nav-link">
        <img src="assets/group_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Miembros">
        Miembros
      </a>

      <a href="#" class="nav-link">
        <img src="assets/attach_money_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Finanzas">
        Finanzas
      </a>

      <a href="#" class="nav-link">
        <img src="assets/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Ajustes">
        Ajustes
      </a>
    </nav>

    <!-- ===== CONTENIDO ===== -->
    <main class="content">

      <!-- Bienvenida -->
      <div class="fadein">
        <p class="welcome-sub">Panel de control</p>
        <h1 class="welcome-title">¡Bienvenido, administrador!</h1>
      </div>

      <!-- Resumen del día -->
      <div class="fadein-2">
        <div class="section-header">
          <span class="section-title">Resumen de hoy</span>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-val">22</div>
            <div class="stat-label">Check-ins</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">$440</div>
            <div class="stat-label">Ingresos</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">3</div>
            <div class="stat-label">Nuevos miembros</div>
          </div>
        </div>
      </div>

      <!-- Gestión de miembros -->
      <div class="fadein-3">
        <div class="section-header">
          <span class="section-title">Gestión de miembros</span>
          <span class="ver-todo">Ver todo</span>
        </div>

        <!-- Buscador -->
        <div class="search-bar">
          <img src="assets/search_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Buscar">
          <input type="text" placeholder="Buscar miembro...">
        </div>

        <!-- Tarjeta de miembro -->
        <div class="member-card">
          <img class="avatar"
               src="assets/account_circle_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
               alt="Avatar">
          <div class="member-info">
            <div class="member-name">Jhoscar Manuel</div>
            <div class="member-days">14 días restantes</div>
          </div>
          <img class="arrow"
               src="assets/arrow_forward_ios_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
               alt="Ver">
        </div>
      </div>

    </main>
  </div>

  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
