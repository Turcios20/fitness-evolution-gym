<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario — FITNESS EVOLUTIONS GYM</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Estilos exclusivos del calendario cliente ── */
    .cal-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 20px 0 10px;
    }

    .cal-search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }
    .cal-search-wrap img { width: 16px; opacity: 0.4; }
    .cal-search-wrap input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      width: 100%;
    }
    .cal-search-wrap input::placeholder { color: var(--text-dim); }

    .cal-inline-state {
      border: 1px solid rgba(232, 124, 42, 0.28);
      background: rgba(232, 124, 42, 0.12);
      border-radius: 10px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 12px;
      padding: 10px 12px;
    }

    .cal-inline-state--warn {
      border-color: rgba(240, 192, 64, 0.35);
      background: rgba(240, 192, 64, 0.12);
    }

    .cal-clase-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      backdrop-filter: blur(12px);
      transition: border-color 0.18s;
    }
    .cal-clase-card.reservada { border-color: rgba(76,219,142,0.35); }
    .cal-clase-card:hover { border-color: rgba(232,124,42,0.35); }

    .cal-clase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .cal-clase-nombre {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 0.5px;
    }
    .cal-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .cal-clase-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .cal-clase-desc {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .cal-btn {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 7px 18px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .cal-btn:hover:not([disabled]) { background: var(--orange-dark); }
    .cal-btn[disabled] { opacity: 0.55; cursor: not-allowed; }
    .cal-btn--reservada { background: #1a6a3a; }
    .cal-btn--llena     { background: #555; }

    .cal-reserva-row {
      background: var(--panel);
      border: 1px solid rgba(76,219,142,0.25);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .cal-reserva-info { flex: 1; }
    .cal-reserva-nombre { font-weight: 700; font-size: 14px; display: block; margin-bottom: 3px; }
    .cal-reserva-meta   { font-size: 12px; color: var(--text-dim); }

    .cal-btn-cancel {
      background: transparent;
      border: 1px solid rgba(176,57,57,0.5);
      color: #e07070;
      border-radius: 6px;
      padding: 5px 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cal-btn-cancel:hover { background: rgba(176,57,57,0.15); }

    .cal-loading, .cal-empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 20px 0;
      text-align: center;
    }
  </style>
</head>
<body class="cliente-page">
  <div class="gym-bg"></div>
  <div class="page">

    <nav class="topnav cliente-topnav">
      <div class="logo">FITNESS<span>EVOLUTIONS GYM</span></div>
      <div class="user-avatar-wrap" id="avatarWrap">
        <div class="user-avatar" id="userAvatar">--</div>
        <div class="avatar-dropdown" id="avatarDropdown">
          <div class="dropdown-name" id="dropdownName">—</div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-logout" id="btnLogout">Cerrar sesión</button>
        </div>
      </div>
    </nav>

    <main class="content cliente-content">

      <div class="fadein">
        <a href="/cliente" class="btn-back">← Volver</a>
        <p class="welcome-sub">Panel de usuario</p>
        <h1 class="welcome-title">Clases y Reservas</h1>
      </div>

      <!-- Mis rutinas asignadas por el entrenador -->
      <div class="fadein-2">
        <p class="cal-section-title">Mis rutinas asignadas</p>
        <div id="misRutinasWrap">
          <p class="cal-loading">Cargando...</p>
        </div>
      </div>

      <div class="fadein-2">
        <p class="cal-section-title">Mis reservas confirmadas</p>
        <div id="misReservasWrap">
          <p class="cal-loading">Cargando reservas...</p>
        </div>
      </div>

      <!-- Buscador -->
      <div class="fadein-2">
        <p class="cal-section-title">Clases disponibles</p>
        <div class="cal-search-wrap">
          <img src="assets/search_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Buscar">
          <input type="text" id="calSearch" placeholder="Buscar clase o entrenador...">
        </div>
        <div id="clasesNotice" class="cal-inline-state cal-inline-state--warn" hidden></div>
        <div id="clasesGrid">
          <p class="cal-loading">Cargando clases...</p>
        </div>
      </div>

    </main>

    <nav class="bottomnav">
      <a href="/cliente" class="bot-link">
        <img src="assets/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Inicio"> Inicio
      </a>
      <a href="/calendario-cliente" class="bot-link active">
        <img src="assets/calendar_month_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Calendario"> Calendario
      </a>
      <a href="/progreso-cliente" class="bot-link">
        <img src="assets/exercise_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Progreso"> Progreso
      </a>
      <a href="/evolucion-cliente" class="bot-link">
        <img src="assets/evolution.svg" alt="Evolucion"> Evolucion
      </a>
      <a href="/ajustes-cliente" class="bot-link">
        <img src="assets/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Ajustes"> Ajustes
      </a>
    </nav>

  </div>

  <script src="common.js"></script>
  <script src="calendario.js"></script>
</body>
</html>
