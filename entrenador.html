<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrenador - FITNESS EVOLUTIONS GYM</title>
  <link rel="stylesheet" href="entrenador.css">
</head>
<body class="entrenador-page">

  <div class="gym-bg"></div>

  <div class="page">
    <nav class="topnav trainer-topnav">
      <div class="logo">
        FITNESS
        <span>EVOLUTIONS GYM</span>
      </div>

      <div class="trainer-top-actions">
        <div class="user-avatar-wrap" id="avatarWrap">
          <span class="role-badge">COACH</span>
          <div class="user-avatar" id="userAvatar">JD</div>
        </div>
        <button type="button" class="trainer-logout" id="btnTrainerLogout">Salir</button>
      </div>
    </nav>

    <main class="content trainer-content">
      <div class="fadein">
        <p class="welcome-sub">Panel de Instructor</p>
        <h1 class="welcome-title" id="welcomeTitle">Hola, Coach</h1>
      </div>

      <div class="fadein-2">
        <div class="trainer-stats-grid">
          <div class="t-stat-card">
            <p class="t-stat-val" id="statTotalClients">0</p>
            <p class="t-stat-label">Clientes Asignados</p>
          </div>
          <div class="t-stat-card">
            <p class="t-stat-val" id="statActiveClients">0</p>
            <p class="t-stat-label">Membresias Activas</p>
          </div>
          <div class="t-stat-card">
            <p class="t-stat-val" id="statExpiringSoon">0</p>
            <p class="t-stat-label">Por Vencer</p>
          </div>
        </div>
      </div>

      <div class="fadein-3">
        <div class="section-header">
          <span class="section-title">Mis Clientes</span>
          <span class="ver-todo" id="clientsHint">Asignados por administracion</span>
        </div>

        <div class="sessions-list" id="assignedClientsList"></div>
      </div>

      <div class="fadein-4">
        <div class="section-header">
          <span class="section-title">Herramientas</span>
        </div>
        <div class="tools-grid">
          <a href="#" class="tool-card">
            <div class="tool-icon">Plan</div>
            <p class="tool-name">Crear Rutina</p>
          </a>
          <a href="#" class="tool-card">
            <div class="tool-icon">Graf</div>
            <p class="tool-name">Progreso Alumnos</p>
          </a>
        </div>
      </div>
    </main>

    <nav class="bottomnav">
      <a href="entrenador.html" class="bot-link active">
        <img src="assets/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Inicio">
        Panel
      </a>
      <a href="#" class="bot-link">
        <img src="assets/calendar_month_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Alumnos">
        Alumnos
      </a>
      <a href="#" class="bot-link">
        <img src="assets/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Perfil">
        Perfil
      </a>
    </nav>
  </div>

  <script src="common.js"></script>
  <script src="entrenador.js"></script>
</body>
</html>
